{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="welcome-title">上传头像</h2>

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    {% if upload_success %}
        <div class="info-message">上传成功！</div>
        <div class="upload-preview">
            <h3>图片预览</h3>
            <img src="{{ file_url }}" alt="头像预览" class="avatar-preview">
            <p class="file-link">文件链接：<a href="{{ file_url }}">{{ file_url }}</a></p>
        </div>
    {% endif %}

    <form method="POST" action="/upload" enctype="multipart/form-data" class="login-form">
        <div class="form-group">
            <label for="file">选择头像文件</label>
            <input type="file" id="file" name="file" class="file-input" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">上传</button>
    </form>
</div>
{% endblock %}

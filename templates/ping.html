{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="welcome-title">Ping 网络诊断</h2>

    {% if error_msg %}
        <div class="error-message">{{ error_msg }}</div>
    {% endif %}

    <form method="POST" action="/ping" class="search-form">
        <input type="text" name="ip" class="search-input" placeholder="请输入 IP 地址或域名（如 8.8.8.8 或 baidu.com）" value="{{ ping_ip or '' }}" required>
        <button type="submit" class="btn btn-primary">Ping</button>
    </form>

    {% if result is defined and result %}
    <div class="ping-terminal">
        <pre class="ping-output">{{ result }}</pre>
    </div>
    {% endif %}
</div>
{% endblock %}

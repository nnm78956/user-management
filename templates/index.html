{% extends "base.html" %}

{% block content %}
<div class="card">
    {% if user %}
        <h2 class="welcome-title">欢迎回来，{{ user.username }}！</h2>
        <div class="user-info">
            <h3>用户信息</h3>
            <ul class="info-list">
                <li><span class="info-label">用户名：</span>{{ user.username }}</li>
                <li><span class="info-label">邮箱：</span>{{ user.email }}</li>
                <li><span class="info-label">手机：</span>{{ user.phone }}</li>
                <li><span class="info-label">角色：</span>{{ user.role }}</li>
                <li><span class="info-label">余额：</span>{{ user.balance }}</li>
            </ul>
        </div>
        <div class="action-bar">
            <a href="/logout" class="btn btn-danger">退出登录</a>
        </div>
    {% else %}
        <div class="not-logged-in">
            <h2>请先登录</h2>
            <p>您还未登录，请登录后查看用户信息。</p>
            <a href="/login" class="btn btn-primary">前往登录</a>
        </div>
    {% endif %}
</div>
{% endblock %}
